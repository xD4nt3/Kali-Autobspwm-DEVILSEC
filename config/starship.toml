# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  DEVILSEC · starship · v1.0.4                                            ║
# ║  More alive: status icons, runtime info, vim mode indicator,             ║
# ║  pretty per-segment separators.                                          ║
# ╚══════════════════════════════════════════════════════════════════════════╝

palette = "devilsec"
add_newline = true

format = """
[ ](bg:bg_alt)\
$os\
$username\
[](fg:bg_alt bg:purple)\
$hostname\
[](fg:purple bg:violet)\
$directory\
[](fg:violet bg:accent)\
$git_branch\
$git_status\
[](fg:accent bg:bg)\
$nodejs$python$rust$golang$java$docker_context\
$fill\
$cmd_duration\
$status\
$time\
$line_break\
$character"""

[palettes.devilsec]
bg          = "#0E0B12"
bg_alt      = "#16121C"
fg          = "#E8E3F2"
fg_dim      = "#807a90"
violet      = "#8A2BE2"
accent      = "#8A2BE2"
crimson     = "#DC2641"
purple      = "#581C87"
ember       = "#FF5E4D"
gold        = "#D4AF37"
green       = "#7FB069"

[fill]
symbol = " "

[os]
disabled = false
format = "[$symbol ](fg:crimson bg:bg_alt)"

[os.symbols]
Linux  = ""
Debian = ""
Kali   = ""
Arch   = ""
Ubuntu = ""
Macos  = ""

[username]
show_always = true
format = "[$user](bold fg:fg bg:bg_alt)"
style_user = "bold fg:fg bg:bg_alt"
style_root = "bold fg:crimson bg:bg_alt"

[hostname]
ssh_only = false
format = "[ $hostname ](fg:fg bg:purple)"

[directory]
format = "[ $path ](bold fg:bg bg:violet)"
truncation_length = 4
truncation_symbol = "…/"
read_only = " "

[directory.substitutions]
"Documents" = " "
"Downloads" = " "
"Music"     = " "
"Pictures"  = " "
"Desktop"   = " "

[git_branch]
symbol = ""
format = "[ $symbol $branch](bold fg:bg bg:accent)"

[git_status]
format = "[$all_status$ahead_behind ](bold fg:bg bg:accent)"
ahead      = " ⇡${count}"
behind     = " ⇣${count}"
diverged   = " ⇕"
up_to_date = ""
untracked  = " ?"
stashed    = " $"
modified   = " !"
staged     = " +"
renamed    = " →"
deleted    = " ✘"

[cmd_duration]
min_time = 1500
format  = " [ $duration ](fg:gold)"

[status]
disabled = false
format = "[ $symbol$status ](fg:crimson)"
symbol   = "✗ "
success_symbol = ""

[time]
disabled = false
time_format = "%H:%M"
format = "[  $time ](fg:fg_dim)"

[python]
symbol = " "
format = "[ ${symbol}${pyenv_prefix}(\\($virtualenv\\) )]($style)"
style  = "fg:gold"

[nodejs]
symbol = " "
format = "[ $symbol]($style)"
style  = "fg:green"

[rust]
symbol = " "
format = "[ $symbol]($style)"
style  = "fg:crimson"

[golang]
symbol = " "
format = "[ $symbol]($style)"
style  = "fg:accent"

[java]
symbol = " "
format = "[ $symbol]($style)"
style  = "fg:crimson"

[docker_context]
symbol = " "
format = "[ $symbol]($style)"
style  = "fg:accent"

[character]
success_symbol  = "[ †](bold fg:violet)"
error_symbol    = "[ †](bold fg:crimson)"
vimcmd_symbol   = "[ †](bold fg:gold)"

[line_break]
disabled = false

[shell]
disabled = true
