; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  DEVILSEC · polybar · v1.0.4d                                            ║
; ║  Firefox + Burp pegados, Burp con icono de bug (FontAwesome).            ║
; ╚══════════════════════════════════════════════════════════════════════════╝

[colors]
background       = #0E0B12
background-alt   = #16121C
foreground       = #E8E3F2
foreground-dim   = #807a90
accent           = #8A2BE2
accent-alt       = #DC2641
violet           = #8A2BE2
crimson          = #DC2641
purple           = #581C87
firefox          = #FF6611
burp             = #E97D24
ok               = #7FB069
urgent           = #FF5E4D

[settings]
background-alpha = ee
screenchange-reload = true
pseudo-transparency = false

[bar/devilsec]
monitor = ${env:MONITOR:}
width   = 100%
height  = 30
fixed-center = true
bottom = false

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
border-size = 0
padding = 1
module-margin = 1

font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = JetBrainsMono Nerd Font:style=Bold:size=10;2
font-2 = Symbols Nerd Font Mono:size=14;3
font-3 = Font Awesome 6 Free:style=Solid:size=12;2
font-4 = Noto Color Emoji:scale=10;2

modules-left   = styx sep workspaces
modules-center = clock
modules-right  = apps sep network sep volume sep powermenu

wm-restack = bspwm
enable-ipc = true
cursor-click = pointer

tray-position = none

[module/styx]
type = custom/text
content = "  󱖫  "
content-foreground = ${colors.crimson}
content-font = 3
click-left  = styx -g &
click-right = kitty -e styx &

[module/sep]
type = custom/text
content = " · "
content-foreground = ${colors.foreground-dim}

[module/workspaces]
type = internal/xworkspaces
pin-workspaces = true
enable-click = true
enable-scroll = true
format = <label-state>
label-active            = %name%
label-active-foreground = ${colors.violet}
label-active-background = ${colors.background-alt}
label-active-underline  = ${colors.crimson}
label-active-padding    = 1
label-occupied            = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding    = 1
label-urgent            = %name%
label-urgent-foreground = ${colors.urgent}
label-urgent-padding    = 1
label-empty             = %name%
label-empty-foreground  = ${colors.foreground-dim}
label-empty-padding     = 1

[module/clock]
type = internal/date
interval = 1
date    =  %a %d %b
time    = %H:%M
label   = %{F#8A2BE2}󰥔%{F-} %time%   %{F#807a90}%date%%{F-}

; Apps cluster — Firefox (Nerd Font icon) + Burp (FontAwesome bug)
; The %{T4} switches to font-4 (Font Awesome) for the Burp bug glyph.
[module/apps]
type = custom/text
; Firefox glyph (Nerd Font:  nf-md-firefox) + Burp glyph (Nerd Font: 󰠭 nf-md-bug-outline)
; Both glyphs are in JetBrainsMono Nerd Font (font-0), guaranteed to render.
content = "%{A1:firefox &:}%{F#FF6611}󰈹%{F-}%{A} %{A1:burpsuite &:}%{F#E97D24}󰠭%{F-}%{A}"
content-font = 3

[module/network]
type = custom/script
exec = devilsec-ip-display
; Polls the script every 1s. No signal-based refresh (that was killing the bar).
interval = 1
scroll-up   = devilsec-ip-action scroll-up
scroll-down = devilsec-ip-action scroll-down
click-left  = devilsec-ip-action click
click-right = devilsec-ip-action copy


[module/volume]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-muted = %{F#DC2641}󰝟%{F-} muted
ramp-volume-0 = %{F#8A2BE2}󰕿%{F-}
ramp-volume-1 = %{F#8A2BE2}󰖀%{F-}
ramp-volume-2 = %{F#8A2BE2}󰕾%{F-}
click-right = pavucontrol &

[module/powermenu]
type = custom/text
content = "  󰐦  "
content-foreground = ${colors.crimson}
content-font = 3
click-left = ~/.config/polybar/scripts/powermenu.sh &
