# DEVILSEC · kitty · v1.1.1
# Background transparency handled by kitty itself (text stays SOLID).
# Adjust live with Ctrl+Shift+O (more) and Ctrl+Shift+I (less).
# Or programmatically: kitty @ set-background-opacity 0.7

font_family       JetBrainsMono Nerd Font
bold_font         JetBrainsMono Nerd Font Bold
italic_font       JetBrainsMono Nerd Font Italic
bold_italic_font  JetBrainsMono Nerd Font Bold Italic
font_size 11
adjust_line_height 105%
disable_ligatures cursor

remember_window_size yes
initial_window_width  1100
initial_window_height 600
window_padding_width 10
hide_window_decorations yes

# ─── True background transparency (text stays solid) ────────────────────────
# kitty applies the alpha ONLY to the background colour. Text, cursor and
# selection are kept at full opacity. The compositor sees a per-pixel alpha
# mask, NOT a uniform window opacity, so the wallpaper bleeds through behind
# the text without making the text itself ghost-like.
background_opacity 0.80
dynamic_background_opacity yes
background_blur 0
confirm_os_window_close 0

cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 0
shell_integration no-cursor

scrollback_lines 20000
wheel_scroll_multiplier 5.0

tab_bar_edge top
tab_bar_style powerline
tab_powerline_style angled
active_tab_foreground   #8A2BE2
active_tab_background   #16121C
inactive_tab_foreground #807a90
inactive_tab_background #0E0B12

foreground       #E8E3F2
background       #0E0B12
selection_foreground #0E0B12
selection_background #8A2BE2
cursor           #DC2641
cursor_text_color background
url_color        #8A2BE2
url_style straight

color0  #0E0B12
color8  #4a4658
color1  #DC2641
color9  #FF5E4D
color2  #7FB069
color10 #95C97C
color3  #D4AF37
color11 #E8C547
color4  #5C5AB0
color12 #7977C9
color5  #8A2BE2
color13 #B266FF
color6  #6FB8C9
color14 #87CDDE
color7  #E8E3F2
color15 #FFFFFF

map ctrl+shift+t         new_tab_with_cwd
map ctrl+shift+w         close_tab
map ctrl+shift+q         close_tab
map ctrl+shift+right     next_tab
map ctrl+shift+left      previous_tab
map ctrl+shift+alt+t     set_tab_title
map ctrl+shift+enter     new_window_with_cwd
map ctrl+shift+l         next_window
map ctrl+shift+h         previous_window
map ctrl+shift+plus      change_font_size all +1
map ctrl+shift+minus     change_font_size all -1
map ctrl+shift+backspace change_font_size all 0
# Live opacity tweaks
map ctrl+shift+o         set_background_opacity +0.05
map ctrl+shift+i         set_background_opacity -0.05

map f1 copy_to_buffer a
map f2 paste_from_buffer a
map f3 copy_to_buffer b
map f4 paste_from_buffer b

enable_audio_bell no
visual_bell_duration 0.0

allow_remote_control yes
listen_on unix:@devilsec-kitty
update_check_interval 0
