# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  DEVILSEC · picom · v1.1.0 final-2                                       ║
# ║                                                                          ║
# ║  Diagnosed bug: in VirtualBox WITHOUT 3D acceleration, the xrender       ║
# ║  backend renders windows as solid black when alpha drops below a         ║
# ║  certain threshold (~50%). This happens because xrender tries to         ║
# ║  unredirect+redirect the window when opacity changes, and the VBox      ║
# ║  framebuffer driver cannot keep up — picom paints the alpha mask as     ║
# ║  the colour instead of blending.                                         ║
# ║                                                                          ║
# ║  Mitigations applied here:                                                ║
# ║    1. detect-client-opacity = false   (don't fight the xprop daemon)    ║
# ║    2. transparent-clipping = false    (no clip-as-alpha misinterpret)   ║
# ║    3. unredir-if-possible  = false    (no unredir cycles)               ║
# ║    4. use-damage           = false    (full repaints, slower but stable)║
# ║    5. xrender-sync-fence   = true     (sync X with picom)               ║
# ║                                                                          ║
# ║  Plus: devilsec-opacity has a 60% floor (lower than that does NOT work  ║
# ║  reliably in VBox-no-3D regardless of config).                          ║
# ║                                                                          ║
# ║  If your VirtualBox has 3D acceleration enabled with 128MB+ VRAM,       ║
# ║  switch backend to "glx" via `styx -m compositor` for better results.   ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ─── Backend ────────────────────────────────────────────────────────────────
backend = "xrender";
vsync = true;
use-damage = false;
unredir-if-possible = false;
xrender-sync-fence = true;

# ─── CRITICAL transparency settings ─────────────────────────────────────────
# Without this, alpha values < 50% in VBox are rendered as black.
transparent-clipping = false;

# Don't let picom fight devilsec-opacity for control of the opacity property.
detect-client-opacity = false;

# ─── Window detection ───────────────────────────────────────────────────────
detect-rounded-corners = true;
detect-transient       = true;
detect-client-leader   = true;
mark-wmwin-focused     = true;
mark-ovredir-focused   = true;
use-ewmh-active-win    = true;

# ─── Shadows ────────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 14;
shadow-opacity = 0.42;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-color = "#000000";
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Cairo-clock'",
    "class_g = 'Polybar'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ─── Fading ─────────────────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
no-fading-openclose = false;
no-fading-destroyed-argb = true;

# ─── Base opacity (compositor itself stays solid) ───────────────────────────
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

# Intentionally NO opacity-rule here. Client opacity is via xprop daemon.

# ─── No blur in safe profile ────────────────────────────────────────────────
blur-background = false;

# ─── Corner rounding ────────────────────────────────────────────────────────
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'"
];

# ─── Focus rules ────────────────────────────────────────────────────────────
focus-exclude = [
    "class_g = 'Cairo-clock'",
    "class_g *?= 'Virtualbox'"
];

# ─── Window types ───────────────────────────────────────────────────────────
wintypes:
{
    tooltip       = { fade = true; shadow = false; focus = true; };
    dock          = { shadow = false; };
    dnd           = { shadow = false; };
    popup_menu    = { shadow = true; opacity = 0.95; };
    dropdown_menu = { shadow = true; opacity = 0.95; };
    menu          = { shadow = true; };
    notification  = { shadow = true; };
    normal        = { shadow = true; };
    splash        = { shadow = false; };
    utility       = { shadow = false; };
};

# ─── Logging ────────────────────────────────────────────────────────────────
log-level = "warn";
log-file = "/tmp/picom.log";
