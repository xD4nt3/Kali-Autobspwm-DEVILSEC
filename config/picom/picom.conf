# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  DEVILSEC · picom · v1.1.1 final                                         ║
# ║                                                                          ║
# ║  Strategy for the "rounded corners + border" problem:                    ║
# ║    • bspc border_width = 0 (no rectangle peeking through)                ║
# ║    • picom corner-radius = 14 (full rounding)                            ║
# ║    • picom shadow tinted violet = acts as focal "glow" border           ║
# ║                                                                          ║
# ║  Transparency model: per-app background-opacity (kitty native, etc.)    ║
# ║  No _NET_WM_WINDOW_OPACITY — text stays solid.                          ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ─── Backend ────────────────────────────────────────────────────────────────
backend = "xrender";
vsync = true;
use-damage = false;
unredir-if-possible = false;
xrender-sync-fence = true;

# ─── Transparency safety ────────────────────────────────────────────────────
transparent-clipping = false;
detect-client-opacity = false;

# ─── Window detection ───────────────────────────────────────────────────────
detect-rounded-corners = true;
detect-transient       = true;
detect-client-leader   = true;
mark-wmwin-focused     = true;
mark-ovredir-focused   = true;
use-ewmh-active-win    = true;

# ─── Shadow as VIOLET FOCAL BORDER ──────────────────────────────────────────
# This is what makes the focused window pop. We tint the shadow with the
# DEVILSEC violet and use a small radius/offset, so it looks like a glow.
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.75;
shadow-offset-x = -4;
shadow-offset-y = -4;
shadow-color = "#8A2BE2";
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Cairo-clock'",
    "class_g = 'Polybar'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c",
    "! focused"
];

# ─── Fading ─────────────────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
no-fading-openclose = false;
no-fading-destroyed-argb = true;

# ─── Base opacity (compositor itself stays solid) ───────────────────────────
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

# No opacity-rule — apps handle their own background transparency.

# ─── No blur ────────────────────────────────────────────────────────────────
blur-background = false;

# ─── Corner rounding (the key fix for the original problem) ─────────────────
corner-radius = 14;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'"
];

# ─── Focus rules ────────────────────────────────────────────────────────────
focus-exclude = [
    "class_g = 'Cairo-clock'",
    "class_g *?= 'Virtualbox'"
];

# ─── Window types ───────────────────────────────────────────────────────────
wintypes:
{
    tooltip       = { fade = true; shadow = false; focus = true; };
    dock          = { shadow = false; };
    dnd           = { shadow = false; };
    popup_menu    = { shadow = true; opacity = 0.95; };
    dropdown_menu = { shadow = true; opacity = 0.95; };
    menu          = { shadow = true; };
    notification  = { shadow = true; };
    normal        = { shadow = true; };
    splash        = { shadow = false; };
    utility       = { shadow = false; };
};

# ─── Logging ────────────────────────────────────────────────────────────────
log-level = "warn";
log-file = "/tmp/picom.log";
