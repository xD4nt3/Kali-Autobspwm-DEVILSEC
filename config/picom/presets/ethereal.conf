# DEVILSEC · picom · ethereal preset
# Cinematic look. Heavy blur, slow fades, deep shadows, strong dim on
# unfocused windows. Perfect for screenshots and demos.

backend = "glx"
vsync = true
use-damage = true

shadow = true;
shadow-radius = 28;
shadow-opacity = 0.6;
shadow-offset-x = -14;
shadow-offset-y = -14;
shadow-color = "#000000";

fading = true;
fade-in-step = 0.02;
fade-out-step = 0.02;
fade-delta = 6;

inactive-opacity = 0.85;
inactive-dim = 0.30;
frame-opacity = 0.9;

opacity-rule = [
    "88:class_g = 'kitty' && focused",
    "72:class_g = 'kitty' && !focused",
    "92:class_g = 'Rofi'",
    "100:fullscreen"
];

blur: {
    method = "dual_kawase";
    strength = 10;
    background = false;
    background-frame = false;
}

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'firefox'"
];

corner-radius = 12;

animations = (
    { triggers = ["open", "show"]; preset = "appear"; duration = 0.35; },
    { triggers = ["close", "hide"]; preset = "disappear"; duration = 0.35; },
    { triggers = ["geometry"]; preset = "geometry-change"; duration = 0.3; }
);
