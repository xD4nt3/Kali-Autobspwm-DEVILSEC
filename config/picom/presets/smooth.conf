# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  DEVILSEC · picom (yshui) · smooth preset                                ║
# ║                                                                          ║
# ║  Balanced blur, soft fades, mild shadows. The default look.              ║
# ║  Other presets live in ~/.config/picom/presets/                          ║
# ║  Switch with: styx -m compositor                                         ║
# ╚══════════════════════════════════════════════════════════════════════════╝

backend = "glx"
vsync = true
use-damage = true
unredir-if-possible = false

# ─── Shadows ─────────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 18;
shadow-opacity = 0.45;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-color = "#000000";
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ─── Fading ──────────────────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 4;
no-fading-openclose = false;
no-fading-destroyed-argb = false;

# ─── Transparency ────────────────────────────────────────────────────────────
inactive-opacity = 0.96;
frame-opacity = 0.95;
inactive-opacity-override = false;

# Per-window opacity rules
opacity-rule = [
    "92:class_g = 'kitty' && focused",
    "82:class_g = 'kitty' && !focused",
    "92:class_g = 'Rofi'",
    "100:class_g = 'firefox'",
    "100:fullscreen",
    "100:class_g = 'Burp-StartBurp'",
    "100:class_g = 'Wireshark'"
];

# ─── Blur (the elegance) ─────────────────────────────────────────────────────
blur: {
    method = "dual_kawase";
    strength = 5;
    background = false;
    background-frame = false;
    background-fixed = false;
}
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'firefox'",
    "class_g = 'Burp-StartBurp'",
    "class_g = 'Wireshark'"
];

# ─── Corner rounding ─────────────────────────────────────────────────────────
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'"
];

# ─── Window-type defaults ────────────────────────────────────────────────────
wintypes:
{
    tooltip      = { fade = true; shadow = true; opacity = 0.85; focus = true; full-shadow = false; };
    dock         = { shadow = false; clip-shadow-above = true; };
    dnd          = { shadow = false; };
    popup_menu   = { opacity = 0.92; shadow = true; };
    dropdown_menu = { opacity = 0.92; shadow = true; };
    menu         = { opacity = 0.92; shadow = true; };
    utility      = { shadow = true; };
    notification = { shadow = true; };
    normal       = { shadow = true; };
};

# ─── Animations (picom 11+ has built-in) ─────────────────────────────────────
animations = (
    {
        triggers = ["open", "show"];
        preset = "appear";
        duration = 0.18;
    },
    {
        triggers = ["close", "hide"];
        preset = "disappear";
        duration = 0.18;
    },
    {
        triggers = ["geometry"];
        preset = "geometry-change";
        duration = 0.18;
    },
    {
        triggers = ["workspace-out"];
        preset = "slide-out";
        duration = 0.2;
    },
    {
        triggers = ["workspace-in"];
        preset = "slide-in";
        duration = 0.2;
    }
);
