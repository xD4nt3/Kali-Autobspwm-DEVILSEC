; DEVILSEC · polybar · minimal variant
; Ultra-clean. Just workspace, clock, and powermenu. For focus sessions.

[colors]
background       = #0E0B12
background-alt   = #16121C
foreground       = #E8E3F2
foreground-dim   = #807a90
accent           = #8A2BE2
accent-alt       = #DC2641
urgent           = #FF5E4D
ok               = #D4AF37
crimson          = #DC2641
violet           = #8A2BE2

[settings]
background-alpha = c8

[bar/devilsec]
monitor = ${env:MONITOR:}
width = 100%
height = 28
offset-x = 0
offset-y = 0
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
border-size = 0
padding-left = 2
padding-right = 2
module-margin = 2
font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = Symbols Nerd Font Mono:size=14;3
modules-left = workspaces
modules-center = clock
modules-right = powermenu
wm-restack = bspwm
enable-ipc = true

[module/workspaces]
type = internal/xworkspaces
pin-workspaces = true
format = <label-state>
label-active = ●
label-active-foreground = ${colors.violet}
label-active-padding = 1
label-occupied = ◉
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1
label-urgent = ◉
label-urgent-foreground = ${colors.urgent}
label-urgent-padding = 1
label-empty = ○
label-empty-foreground = ${colors.foreground-dim}
label-empty-padding = 1

[module/clock]
type = internal/date
interval = 1
date = %a %d %b · %H:%M
label = %date%
label-foreground = ${colors.foreground-dim}

[module/powermenu]
type = custom/text
content = "  󰐦"
content-foreground = ${colors.crimson}
content-font = 2
click-left = ~/.config/polybar/scripts/powermenu.sh &
