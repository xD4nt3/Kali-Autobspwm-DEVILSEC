; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  DEVILSEC · polybar  ·  default theme                                    ║
; ║                                                                          ║
; ║  A single, elegant top bar. Three zones (left/center/right) with         ║
; ║  separators that double as section markers. The accent is violet,        ║
; ║  alerts are crimson, sub-text is ash.                                    ║
; ║                                                                          ║
; ║  Edit through `styx -m polybar` rather than this file directly —         ║
; ║  height, opacity and font size are managed by styx.                      ║
; ╚══════════════════════════════════════════════════════════════════════════╝

[colors]
; — DEVILSEC palette ————————————————————————————————————————————————
background       = #0E0B12
background-alt   = #16121C
foreground       = #E8E3F2
foreground-dim   = #807a90
accent           = #8A2BE2
accent-alt       = #DC2641
urgent           = #FF5E4D
ok               = #D4AF37
crimson          = #DC2641
violet           = #8A2BE2
purple           = #581C87
onyx             = #0E0B12

; background-alpha is patched by styx -m polybar (0–ff)
[settings]
background-alpha = ee
screenchange-reload = true
pseudo-transparency = false
format-padding = 1

; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  BAR                                                                     ║
; ╚══════════════════════════════════════════════════════════════════════════╝

[bar/devilsec]
monitor = ${env:MONITOR:}
width   = 100%
height  = 30
offset-x = 0
offset-y = 0
fixed-center = true
bottom = false

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2

border-size = 0
border-color = #00000000

padding-left  = 1
padding-right = 1
module-margin-left  = 1
module-margin-right = 1

font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = JetBrainsMono Nerd Font:style=Bold:size=10;2
font-2 = Symbols Nerd Font Mono:size=14;3
font-3 = Noto Color Emoji:scale=10:style=Regular;2

modules-left   = launcher sep workspaces sep title
modules-center = clock
modules-right  = net sep cpu memory sep volume sep updates sep powermenu

separator =
spacing   = 1

cursor-click = pointer
cursor-scroll = ns-resize

wm-restack = bspwm
enable-ipc = true

tray-position = none

; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  MODULES — LEFT                                                          ║
; ╚══════════════════════════════════════════════════════════════════════════╝

[module/launcher]
type = custom/text
content = " 󰢾 "
content-foreground = ${colors.crimson}
content-background = ${colors.background}
content-font = 3
click-left = rofi -show drun -theme ~/.config/rofi/themes/devilsec.rasi &
click-right = styx -g &

[module/sep]
type = custom/text
content = " · "
content-foreground = ${colors.foreground-dim}

[module/workspaces]
type = internal/xworkspaces
pin-workspaces = true
enable-click = true
enable-scroll = true

format = <label-state>

label-active       = %name%
label-active-foreground = ${colors.violet}
label-active-background = ${colors.background-alt}
label-active-underline  = ${colors.crimson}
label-active-padding    = 1

label-occupied          = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding    = 1

label-urgent            = %name%
label-urgent-foreground = ${colors.urgent}
label-urgent-padding    = 1

label-empty             = %name%
label-empty-foreground  = ${colors.foreground-dim}
label-empty-padding     = 1

[module/title]
type = internal/xwindow
label = %title:0:80:…%
label-foreground = ${colors.foreground-dim}
label-empty = devilsec
label-empty-foreground = ${colors.foreground-dim}
label-font = 1

; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  CENTER                                                                  ║
; ╚══════════════════════════════════════════════════════════════════════════╝

[module/clock]
type = internal/date
interval = 1
date    =  %a %d %b
time    = %H:%M
label   = %{F#8A2BE2}󰥔%{F-} %time%   %{F#807a90}%date%%{F-}

; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  RIGHT                                                                   ║
; ╚══════════════════════════════════════════════════════════════════════════╝

[module/net]
type = internal/network
interface-type = wired
interface-type-fallback = wireless
interval = 2
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-connected     = %{F#8A2BE2}󰈁%{F-} %ifname% %{F#807a90}%local_ip%%{F-}
label-disconnected  = %{F#DC2641}󰈂%{F-} offline

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label  = %{F#8A2BE2}%{F-} %percentage%%

[module/memory]
type = internal/memory
interval = 3
format = <label>
label  = %{F#8A2BE2}%{F-} %gb_used%/%gb_total%

[module/volume]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-muted = %{F#DC2641}󰝟%{F-} muted
ramp-volume-0 = %{F#8A2BE2}󰕿%{F-}
ramp-volume-1 = %{F#8A2BE2}󰖀%{F-}
ramp-volume-2 = %{F#8A2BE2}󰕾%{F-}
click-right = pavucontrol &

[module/updates]
type = custom/script
exec = ~/.config/polybar/scripts/updates.sh
interval = 1800
format = <label>
label = %output%
click-left = kitty -e bash -c "sudo apt update && sudo apt list --upgradable; read -p 'press enter ▸ ' _"

[module/powermenu]
type = custom/text
content = "  󰐦  "
content-foreground = ${colors.crimson}
content-font = 3
click-left = ~/.config/polybar/scripts/powermenu.sh &
