; DEVILSEC · polybar · spectral variant
; Floating islands separated by gaps. Three visual blocks instead of one bar.

[colors]
background       = #0E0B12
background-alt   = #16121C
foreground       = #E8E3F2
foreground-dim   = #807a90
accent           = #8A2BE2
accent-alt       = #DC2641
violet           = #8A2BE2
crimson          = #DC2641

[settings]
background-alpha = ee

[bar/devilsec]
monitor = ${env:MONITOR:}
width = 100%
height = 36
offset-x = 8
offset-y = 8
fixed-center = true
background = #00000000
foreground = ${colors.foreground}
border-size = 0
padding-left = 0
padding-right = 0
module-margin = 0
font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = JetBrainsMono Nerd Font:style=Bold:size=10;2
font-2 = Symbols Nerd Font Mono:size=14;3

modules-left = lpad-left workspaces title rpad-left
modules-center = lpad-center clock rpad-center
modules-right = lpad-right cpu memory volume powermenu rpad-right

wm-restack = bspwm
enable-ipc = true

; The trick: empty modules with backgrounds act as left/right rounded caps
[module/lpad-left]
type = custom/text
content = " "
content-background = ${colors.background}
[module/rpad-left]
type = custom/text
content = " "
content-background = ${colors.background}

[module/lpad-center]
type = custom/text
content = " "
content-background = ${colors.background}
[module/rpad-center]
type = custom/text
content = " "
content-background = ${colors.background}

[module/lpad-right]
type = custom/text
content = " "
content-background = ${colors.background}
[module/rpad-right]
type = custom/text
content = " "
content-background = ${colors.background}

[module/workspaces]
type = internal/xworkspaces
pin-workspaces = true
format = <label-state>
format-background = ${colors.background}
label-active = " %name% "
label-active-foreground = ${colors.violet}
label-active-underline = ${colors.crimson}
label-occupied = " %name% "
label-occupied-foreground = ${colors.foreground}
label-urgent = " %name% "
label-urgent-foreground = ${colors.crimson}
label-empty = " %name% "
label-empty-foreground = ${colors.foreground-dim}

[module/title]
type = internal/xwindow
format-background = ${colors.background}
label = " %title:0:50:…% "
label-foreground = ${colors.foreground-dim}
label-empty = " devilsec "

[module/clock]
type = internal/date
interval = 1
date = %H:%M  ·  %a %d %b
format-background = ${colors.background}
label = " %date% "

[module/cpu]
type = internal/cpu
interval = 2
format-background = ${colors.background}
label = " %{F#8A2BE2}%{F-} %percentage%% "

[module/memory]
type = internal/memory
interval = 3
format-background = ${colors.background}
label = " %{F#8A2BE2}%{F-} %percentage_used%% "

[module/volume]
type = internal/pulseaudio
format-volume-background = ${colors.background}
label-volume = " %{F#8A2BE2}󰕾%{F-} %percentage%% "
label-muted = " %{F#DC2641}󰝟%{F-} muted "
label-muted-background = ${colors.background}

[module/powermenu]
type = custom/text
content = "  󰐦  "
content-background = ${colors.background}
content-foreground = ${colors.crimson}
content-font = 3
click-left = ~/.config/polybar/scripts/powermenu.sh &
